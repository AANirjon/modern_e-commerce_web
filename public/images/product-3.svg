<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#f8fafc"/>
  
  <!-- Speaker body -->
  <rect x="75" y="60" width="150" height="180" rx="20" fill="#1f2937"/>
  
  <!-- Speaker top section -->
  <rect x="75" y="60" width="150" height="80" rx="20" fill="#374151"/>
  
  <!-- Display area -->
  <rect x="95" y="80" width="110" height="40" rx="8" fill="#111827"/>
  
  <!-- Speaker grilles -->
  <g stroke="#4b5563" stroke-width="2">
    <line x1="100" y1="140" x2="200" y2="140"/>
    <line x1="100" y1="155" x2="200" y2="155"/>
    <line x1="100" y1="170" x2="200" y2="170"/>
    <line x1="100" y1="185" x2="200" y2="185"/>
  </g>
  
  <!-- Center button -->
  <circle cx="150" cy="210" r="12" fill="#3b82f6"/>
  
  <!-- Subtle highlight -->
  <ellipse cx="120" cy="100" rx="20" ry="15" fill="white" opacity="0.1"/>
</svg>
